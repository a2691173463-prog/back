server:
  port: 8080

spring:
  application:
    name: back
  datasource:
    url: jdbc:mysql://localhost:3306/interview_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  rabbitmq:
    host: localhost
    port: 5672

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

ai:
  # Java 后端只负责业务编排，所有大模型调用统一转发给 Python agent-service。
  # 启动方式：cd D:\简历项目\agent-service; powershell -ExecutionPolicy Bypass -File .\start.ps1
  python-agent:
    base-url: http://localhost:8000
    timeout-seconds: 120
  internal-secret: ${AI_INTERNAL_SECRET:local-agent-secret-change-me}
